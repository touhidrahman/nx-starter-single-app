@let group = selectedGroup();

<div class="flex items-center justify-between gap-3 pb-4">
    <h2 class="mt-2 text-3xl font-bold">Group Details</h2>
</div>

<p-card>
    @if (group) {
        <p-tabs [scrollable]="true" class="mb-6">
            <p-tablist>
                @for (tab of GROUP_TABS; track tab.route) {
                    <p-tab
                        [routerLink]="tab.route"
                        routerLinkActive="active-link"
                        class="nav-link">
                        <i [class]="tab.icon"></i>
                        {{ tab.label }}
                    </p-tab>
                }
            </p-tablist>
        </p-tabs>

        <router-outlet></router-outlet>
    }
</p-card>
