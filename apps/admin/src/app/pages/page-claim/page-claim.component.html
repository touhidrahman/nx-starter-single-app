    <p-accordion [multiple]="true">
        @for (section of claimStateService.groupedClaimSections(); track section) {
            <p-accordion-panel [value]="section">
                <p-accordion-header>
                    {{ section }}
                </p-accordion-header>
                <p-accordion-content>
                    <p-table
                        [value]="claimStateService.groupedClaims()[section]"
                        [tableStyle]="{ 'min-width': '50rem' }"
                        stripedRows="true">
                        <ng-template #header>
                            <tr>
                                <th>ID</th>
                                <th>Description</th>
                            </tr>
                        </ng-template>

                        <ng-template #body let-claim>
                            <tr>
                                <td>{{ claim.id }}</td>
                                <td>{{ claim.description }}</td>
                            </tr>
                        </ng-template>
                    </p-table>
                </p-accordion-content>
            </p-accordion-panel>
        }
    </p-accordion>
} @else {
    <lib-no-data [noDataMessage]="'No data found'" />
}
