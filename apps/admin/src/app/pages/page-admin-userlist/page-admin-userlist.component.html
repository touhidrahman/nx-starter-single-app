<div>
    <h1 class="text-2xl font-bold">Admin List</h1>
    <div
        class="my-5 flex flex-col justify-between gap-4 md:flex-row md:items-center">
        <p-button
            (click)="openAdminCreateModal()"
            styleClass="bg-primary"
            label="Create Admin"
            icon="pi pi-plus"
            iconPos="left"></p-button>
    </div>

    <p-card>
        @if (isLoading()) {
            <div class="flex items-center justify-center py-8">
                <i
                    class="pi pi-spin pi-spinner"
                    style="font-size: 2rem; color: green"></i>
            </div>
        } @else if (users.length > 0) {
            <p-table [value]="users">
                <ng-template #header>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Is Verified</th>
                        <th>Actions</th>
                    </tr>
                </ng-template>
                <ng-template #body let-user>
                    <tr class="last:border-b-0">
                        <td class="py-1">{{ user.name }}</td>
                        <td>{{ user.email }}</td>
                        <td>
                            <span
                                class="me-2 inline-block rounded-sm px-2.5 py-0.5 text-xs font-medium whitespace-nowrap"
                                [ngClass]="{
                                    'bg-pink-100 text-pink-800':
                                        user.status === 'inactive',
                                    'bg-emerald-100 text-emerald-800':
                                        user.status === 'active',
                                }">
                                {{ user.status | uppercase }}</span
                            >
                        </td>
                        <td class="py-1">
                            <span
                                class="me-2 inline-block rounded-sm px-2.5 py-0.5 text-xs font-medium whitespace-nowrap uppercase"
                                [ngClass]="{
                                    'bg-red-100 text-red-800': !user.verified,
                                    'bg-purple-100 text-purple-800':
                                        user.verified,
                                }">
                                {{ user.verified ? 'Verified' : 'Unverified' }}
                            </span>
                        </td>
                        <td class="py-1">
                            <p-button
                                severity="success"
                                rounded="true"
                                text="true"
                                icon="pi pi-pen-to-square"
                                (click)="openEditAdminDialog(user)" />
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        } @else {
            <lib-no-data [noDataMessage]="'No data found'" />
        }
    </p-card>

    <p-dialog
        header="Edit Admin Status"
        [(visible)]="displayEditAdminDialog"
        [style]="{ width: '50vw', height: '40vh' }"
        [modal]="true"
        [closable]="true"
        [breakpoints]="{
            '960px': '75vw',
            '640px': '90vw',
        }">
        <div>
            <label class="mb-2 block">Status</label>
            <p-select
                appendTo="body"
                [overlayOptions]="{ autoZIndex: true }"
                [(ngModel)]="selectedAdmin.status"
                [options]="statusOptions"
                optionLabel="label"
                optionValue="value"
                placeholder="Select Status"
                class="w-full">
            </p-select>
        </div>

        <ng-template pTemplate="footer">
            <div class="flex gap-2">
                <p-button
                    styleClass="rounded-sm"
                    label="Cancel"
                    size="small"
                    [rounded]="true"
                    severity="secondary"
                    (click)="displayEditAdminDialog = false" />
                <p-button
                    styleClass="rounded-sm"
                    label="Save"
                    size="small"
                    [rounded]="true"
                    severity="success"
                    (click)="updateAdminStatus()" />
            </div>
        </ng-template>
    </p-dialog>
</div>
