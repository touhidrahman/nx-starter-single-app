<p-card [style]="{ width: '25rem', overflow: 'hidden' }">
    <ng-template #header> </ng-template>
    <ng-template #title> Plan Type: {{ subscribedPlan?.subscriptionType }} </ng-template>
    <ng-template #subtitle>Group ID: {{ subscribedPlan?.groupId }} </ng-template>
    <p>User ID: {{ subscribedPlan?.userId }}</p>
    <ng-template #footer>
        <div class="mt-1 flex gap-4">
            <p-button
                label="Cancel"
                severity="secondary"
                class="w-full"
                [outlined]="true"
                styleClass="w-full" />
            <p-button
                (click)="confirmSubscription()"
                [loading]="isLoading()"
                [disabled]="isLoading()"
                label="Confirm"
                class="w-full"
                styleClass="w-full" />
        </div>
    </ng-template>
</p-card>
