<form
    [formGroup]="lawyerFormService.form"
    class="bg-color-container space-y-10 rounded-xl bg-white p-8 shadow-md">
    <!-- Section: Personal Information -->
    <div>
        <h3 class="border-gray secondary-text mb-6 border-b pb-2 text-lg font-semibold">
            Personal Information
        </h3>
        <div class="grid grid-cols-1 gap-6 md:grid-cols-3">
            <div>
                <label class="mb-1 block text-sm font-medium"
                    >Name <span class="text-red-500">*</span></label
                >
                <input pInputText formControlName="name" class="w-full" />
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium"
                    >Email <span class="text-red-500">*</span></label
                >
                <input pInputText formControlName="email" class="w-full" />
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium"
                    >Phone Number <span class="text-red-500">*</span></label
                >
                <input pInputText formControlName="phoneNumber" class="w-full" />
            </div>
        </div>
    </div>

    <!-- Section: Professional Information -->
    <div>
        <h3 class="border-gray secondary-text mb-6 border-b pb-2 text-lg font-semibold">
            Professional Information
        </h3>
        <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
            <div>
                <label class="mb-1 block text-sm font-medium"
                    >Institute Name <span class="text-red-500">*</span></label
                >
                <input pInputText formControlName="instituteName" class="w-full" />
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium">Institution ID</label>
                <input pInputText formControlName="institutionId" class="w-full" />
            </div>
        </div>

        <div class="mt-6 grid grid-cols-1 gap-6 md:grid-cols-3">
            <div>
                <label class="mb-1 block text-sm font-medium"
                    >Lawyer Type <span class="text-red-500">*</span></label
                >
                <p-select
                    formControlName="lawyerType"
                    [options]="lawyerTypes"
                    optionLabel="label"
                    optionValue="value"
                    placeholder="Select lawyer type"
                    class="w-full"></p-select>
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium"
                    >Practice Start Year <span class="text-red-500">*</span></label
                >
                <p-datepicker
                    formControlName="practiceStartYear"
                    view="year"
                    dateFormat="yy"
                    [maxDate]="today"
                    showIcon="true"
                    appendTo="body"
                    [readonlyInput]="true"
                    placeholder="Select year"
                    class="w-full"></p-datepicker>
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium">Description</label>
                <input pInputText formControlName="description" class="w-full" />
            </div>
        </div>
    </div>

    <!-- Section: Contact & Location -->
    <div>
        <h3 class="border-gray secondary-text mb-6 border-b pb-2 text-lg font-semibold">
            Contact & Location
        </h3>
        <div class="grid grid-cols-1 gap-6 md:grid-cols-3">
            <div>
                <label class="mb-1 block text-sm font-medium"
                    >Address <span class="text-red-500">*</span></label
                >
                <input pInputText formControlName="address" class="w-full" />
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium"
                    >City <span class="text-red-500">*</span></label
                >
                <input pInputText formControlName="city" class="w-full" />
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium"
                    >District <span class="text-red-500">*</span></label
                >
                <p-select
                    formControlName="district"
                    [options]="districts"
                    optionLabel="label"
                    optionValue="value"
                    placeholder="Select district"
                    [filter]="true"
                    filterBy="label"
                    showClear="true"
                    class="w-full"></p-select>
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium"
                    >Post Code <span class="text-red-500">*</span></label
                >
                <input pInputText formControlName="postCode" class="w-full" />
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium">Latitude</label>
                <input pInputText formControlName="latitude" class="w-full" />
            </div>
            <div>
                <label class="mb-1 block text-sm font-medium">Longitude</label>
                <input pInputText formControlName="longitude" class="w-full" />
            </div>
        </div>

        <div class="mt-4 grid grid-cols-1 gap-5 md:grid-cols-2">
            <div class="bg-gray-white-700 h-72 rounded-lg bg-gray-100 p-6">
                <div class="mb-5 flex items-center gap-2">
                    <!-- <img
                        src="https://fonts.gstatic.com/s/i/googlematerialicons/location_pin/v5/24px.svg"
                        alt="Location Pin"
                        class="mr-2 h-6 w-6" /> -->
                    <i class="pi pi-map-marker secondary-text"></i>
                    <span class="secondary-text text-xl font-medium">Address Selection</span>
                </div>

                <div class="space-y-4">
                    <input
                        type="text"
                        placeholder="Address"
                        formControlName="address"
                        id="location-input"
                        #addressInput
                        class="bg-color-main secondary-text w-full rounded-md border border-gray-300 p-3 text-base focus:ring-2 focus:ring-blue-500 focus:outline-none dark:border-none" />

                    <input
                        type="text"
                        placeholder="City"
                        formControlName="city"
                        id="locality-input"
                        class="bg-color-main secondary-text w-full rounded-md border border-gray-300 p-3 text-base focus:ring-2 focus:ring-blue-500 focus:outline-none dark:border-none" />
                </div>
            </div>
            <div class="h-72 w-full">
                @if (isMapReady()) {
                    <google-map
                        [height]="'100%'"
                        [width]="'100%'"
                        [options]="mapOptions"
                        [center]="googleMapService.mapCenter()"
                        [zoom]="googleMapService.mapZoom()"
                        (mapClick)="onMapClick($event)">
                        @for (marker of lawyerMarkers; track marker.position) {
                            <map-marker [position]="marker.position" [title]="marker.title">
                                @if (marker.content) {
                                    <map-info-window>
                                        <div [innerHTML]="marker.content"></div>
                                    </map-info-window>
                                }
                            </map-marker>
                        }
                    </google-map>
                } @else {
                    <div class="text-center text-gray-500">Loading Google Maps...</div>
                }
            </div>
        </div>
    </div>

    <!-- Section: Other Information -->
    <div>
        <h3 class="border-gray secondary-text mb-6 border-b pb-2 text-lg font-semibold">
            Other Information
        </h3>
        <div class="grid grid-cols-1 gap-6 md:grid-cols-3">
            <div>
                <label class="mb-1 block text-sm font-medium">Interested Area</label>
                <input pInputText formControlName="interestedArea" class="w-full" />
            </div>
        </div>

        <div class="mt-5 flex items-center gap-2">
            <p-checkbox formControlName="sponsored" [binary]="true" inputId="sponsored" />
            <label for="sponsored" class="text-sm"
                >Sponsored, Experienced lawyer specializing in corporate law</label
            >
        </div>
    </div>

    <div class="border-gray flex justify-end border-t pt-6">
        <p-button
            [loading]="isLoading()"
            [disabled]="isLoading() || lawyerFormService.form.invalid"
            label="Submit"
            (click)="onSubmitted()" />
    </div>
</form>
