<section
    class="relative mx-auto flex h-full flex-col items-center justify-center overflow-hidden bg-cover bg-center bg-no-repeat px-4 py-12 lg:px-16 lg:py-8">
    <!-- Section Heading -->
    <div class="relative mx-auto max-w-7xl text-center">
        <h1
            class="bg-gradient-to-r from-green-900 via-green-600 to-cyan-700 bg-clip-text text-3xl leading-tight font-bold text-transparent sm:text-4xl xl:text-5xl">
            Plans & Pricing
        </h1>
        <h3
            class="mx-auto my-4 max-w-2xl text-center text-lg text-gray-600 md:text-xl">
            Choose a plan that evolves with your practice — sleek, transparent,
            and built for the future.
        </h3>
    </div>

    <!-- Plan Toggle Buttons -->
    <div class="relative mt-8">
        @let allPlans = planStateService.select('plans') | async;
        <div class="mx-auto md:max-w-sm">
            <div
                class="z-0 mt-6 inline-flex w-full overflow-hidden rounded-full border border-gray-300 p-0.5">
                <button
                    class="h-12 w-full cursor-pointer rounded-full bg-black/50 px-8 py-2 font-medium text-white transition"
                    [ngClass]="{
                        'bg-black/50 text-white': isYearly() !== 'yearly',
                        'text-gray-600': isYearly() === 'yearly',
                    }"
                    (click)="onYearlyChange('monthly')"
                    [attr.aria-pressed]="isYearly() !== 'yearly'">
                    Monthly
                </button>
                <button
                    class="h-12 w-full cursor-pointer rounded-full px-8 py-2 font-medium text-white transition"
                    [ngClass]="{
                        'bg-black/50 text-white': isYearly() === 'yearly',
                        'text-gray-600': isYearly() !== 'yearly',
                    }"
                    (click)="onYearlyChange('yearly')"
                    [attr.aria-pressed]="isYearly() === 'yearly'">
                    Annual
                </button>
            </div>
        </div>

        <!-- Plan Cards -->
        <app-plan-card
            class="my-12"
            [allPlans]="allPlans ?? []"
            [isYearly]="isYearly()" />
    </div>
</section>
