<section
    class="mx-auto my-6 px-1 py-6 lg:px-16"
    role="region"
    aria-label="Digital Case Diary Feature">
    <div
        class="relative isolate overflow-hidden bg-gray-900 px-6 pt-16 shadow-2xl sm:rounded-3xl sm:px-16 md:pt-24 lg:flex lg:gap-x-20 lg:px-24 lg:pt-0">
        <svg
            viewBox="0 0 1024 1024"
            aria-hidden="true"
            class="absolute top-1/2 left-1/2 -z-10 size-256 -translate-y-1/2 mask-[radial-gradient(closest-side,white,transparent)] sm:left-full sm:-ml-80 lg:left-1/2 lg:ml-0 lg:-translate-x-1/2 lg:translate-y-0">
            <circle
                r="512"
                cx="512"
                cy="512"
                fill="url(#759c1415-0410-454c-8f7c-9a820de03641)"
                fill-opacity="0.6" />
            <defs>
                <radialGradient id="759c1415-0410-454c-8f7c-9a820de03641">
                    <stop stop-color="#66cc00" />
                    <stop offset="1" stop-color="#7cfc00" />
                </radialGradient>
            </defs>
        </svg>
        <div
            class="mx-auto max-w-xl text-center lg:mx-0 lg:flex-auto lg:py-32 lg:text-left">
            <h2
                class="text-4xl font-semibold tracking-tight text-balance text-white"
                role="heading"
                aria-level="3">
                Your <br class="block md:hidden" />
                <span class="gradient-text text-bold">Digital Case Diary</span>
                <br class="block md:hidden" />
                for court dates, appointments, and reminders.
            </h2>
            <p class="mt-6 text-lg/8 text-pretty text-lime-200">
                Never miss a deadline with our built-in legal calendar, designed
                to manage court dates, appointments, and reminders effortlessly.
            </p>
            <div
                class="mt-4 flex items-center justify-center gap-x-6 md:mt-10 lg:justify-start">
                <button
                    [routerLink]="['/signup']"
                    class="cursor-pointer rounded-md bg-white px-4 py-3 text-sm font-semibold text-gray-900 shadow-xs hover:bg-gray-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white"
                    aria-label="Get started with Digital Case Diary">
                    Get started
                </button>
            </div>
        </div>
        <div class="relative mt-16 h-80 lg:mt-8">
            <img
                [ngSrc]="'assets/images/calendar.png'"
                alt="App screenshot"
                width="1824"
                height="1080"
                src="assets/images/calendar.png"
                alt="Digital Case Diary app screenshot showing calendar view"
                class="absolute top-0 left-12 w-228 max-w-none rounded-xl bg-white/5 ring-1 ring-white/10 md:left-28"
                loading="lazy" />
        </div>
    </div>
</section>
