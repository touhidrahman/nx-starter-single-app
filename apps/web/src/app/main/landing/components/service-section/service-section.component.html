<section class="mx-auto bg-white px-4 py-6 lg:px-16" role="region" aria-label="Services Section">
    <div class="text-center">
        <h1
            class="bg-gradient-to-r from-green-900 via-green-600 to-cyan-700 bg-clip-text text-3xl leading-tight font-bold text-transparent sm:text-4xl xl:text-5xl"
            role="heading"
            aria-level="1">
            {{ sectionTitle }}
        </h1>

        <h3
            class="subtitle mx-4 my-4 text-center text-lg text-gray-600 md:text-lg"
            role="heading"
            aria-level="2">
            {{ sectionSubtitle }}
        </h3>
    </div>

    <div
        class="mt-4 grid grid-cols-1 gap-y-12 text-center sm:mt-16 sm:grid-cols-2 sm:gap-x-12 md:grid-cols-3 md:gap-0 xl:mt-24">
        @for (service of services; track service.title) {
            <div class="{{ service.extraClasses }}">
                <img
                    [ngSrc]="service.icon"
                    [alt]="service.alt"
                    width="96"
                    height="96"
                    class="mx-auto h-24 w-24"
                    loading="lazy" />
                <h1 class="font-pj mt-2 text-2xl font-bold text-gray-900 md:mt-12">
                    {{ service.title }}
                </h1>
                <p class="font-pj mt-2 text-base text-gray-600 md:mt-5 lg:text-lg">
                    {{ service.description }}
                </p>
            </div>
        }
    </div>
</section>
