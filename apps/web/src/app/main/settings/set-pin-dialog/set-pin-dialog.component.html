<div class="flex justify-center">
    <div class="flex flex-col items-center">
        <div class="mb-2 text-xl font-bold">Set Your PIN</div>
        <p class="text-muted-color mb-8 block">Please enter new PIN.</p>
        <p-inputotp [(ngModel)]="value" [length]="6">
            <ng-template #input let-token let-events="events" let-index="index">
                <input
                    type="text"
                    [maxLength]="1"
                    (input)="events.input($event)"
                    (keydown)="events.keydown($event)"
                    [attr.value]="token"
                    class="custom-otp-input" />
                @if (index === 3) {
                    <div class="px-4">
                        <i class="pi pi-minus"></i>
                    </div>
                }
            </ng-template>
        </p-inputotp>
        <div class="my-8 flex justify-between self-end-safe">
            <p-button [disabled]="value().length < 6" label="SET PIN" (onClick)="setPin()" />
        </div>
    </div>
</div>
