server {
    listen       80;
    server_name  localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files directly with long cache headers
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?|eot|ttf)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
    }

    # HTML files - no caching
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: increase body size if uploading large files
    client_max_body_size 50M;
}
