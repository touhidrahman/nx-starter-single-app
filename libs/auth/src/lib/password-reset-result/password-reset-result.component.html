<div class="mt-4 flex items-center justify-center p-4 md:mt-10">
    <div class="text-center">
        @if (status === 'success') {
            <div class="flex flex-col items-center justify-center gap-1">
                <img
                    class="w-56"
                    src="/assets/images/create-profile.png"
                    alt="" />
                <p class="text-2xl">
                    Your password has been reset successfully!
                </p>
                <div
                    class="mt-1 mb-4 rounded-2xl bg-white px-4 py-1 text-base text-gray-800"
                    role="alert">
                    You can now log in with your new password.
                </div>

                <p-button
                    styleClass="bg-green-700 w-24 border border-green-700"
                    (onClick)="navigateTo('/login')"
                    [severity]="'success'"
                    size="small"
                    label="Login Now" />
            </div>
        }

        @if (status === 'failed') {
            <div class="flex flex-col items-center justify-center gap-1">
                <img class="w-56" src="/assets/images/unsuccess.png" alt="" />
                <p class="text-2xl">Password reset request Failed!</p>

                <p-button
                    (onClick)="navigateTo('/forgot-password')"
                    styleClass="bg-secondary mt-4 hover:bg-primary w-24"
                    size="small"
                    label="Try Again" />
            </div>
        }
    </div>
</div>
