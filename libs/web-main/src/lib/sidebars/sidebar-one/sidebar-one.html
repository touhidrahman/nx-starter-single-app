<div class="flex h-full flex-col p-4">
    <!-- Sidebar Header -->
    <div class="flex items-center gap-3 p-2">
        <div
            class="aspect-square size-10 rounded-full bg-cover bg-center bg-no-repeat"
            data-alt="User profile picture of Alex Doe"
            style="
                background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCrsNatYKSM0TnK_c3TdypFvAoKWa5425M0wmDphMsdqxhcKMGQPtQaZQQuhqxuoQO2m51cC8S5lbAEuebxzbyg1wEEl-GBn8oX1fPwo5pMnFkw4awbGhELdlFDO-nVhErvoxZ8myZ1cc846z91O0uF_7qzNnPTLU-NOHgqkzJ-XdUsJ2D0r6QSIIWlc6QSZgZB4UMaJi3NOXBW2bJB3L_BMl4cTuCrFrSMA9q3DcG3Ex5xEAxPxioixAF9VI7K_-kCTF66W8zn4C6K');
            "
        ></div>
        <div class="flex flex-col">
            <h1 class="text-base leading-normal font-medium text-gray-900">Alex Doe</h1>
            <p class="text-sm leading-normal font-normal text-gray-500">alex.doe email.com</p>
        </div>
    </div>

    <div class="mt-4 flex flex-col gap-2">
        <a
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="text-primary flex items-center gap-3 rounded-lg px-3 py-2"
            routerLink="/"
        >
            <span class="material-symbols-outlined">dashboard</span>
            <p class="text-sm leading-normal font-medium">Dashboard</p>
        </a>
        <a
            [routerLink]="[accountRoutes.index.path]"
            routerLinkActive="active"
            class="text-primary flex items-center gap-3 rounded-lg px-3 py-2"
        >
            <span class="material-symbols-outlined">account_balance_wallet</span>
            <p class="text-sm leading-normal font-medium">Accounts</p>
        </a>
        <a
            class="flex items-center gap-3 rounded-lg px-3 py-2 text-gray-700 hover:bg-gray-200"
            [routerLink]="[transactionRoutes.index.path]"
            routerLinkActive="active"
        >
            <span class="material-symbols-outlined">receipt_long</span>
            <p class="text-sm leading-normal font-medium">Transactions</p>
        </a>
        <a
            class="flex items-center gap-3 rounded-lg px-3 py-2 text-gray-700 hover:bg-gray-200"
            href="#"
        >
            <span class="material-symbols-outlined">donut_small</span>
            <p class="text-sm leading-normal font-medium">Budgets</p>
        </a>
        <!-- categories link -->
        <a
            class="flex items-center gap-3 rounded-lg px-3 py-2 text-gray-700 hover:bg-gray-200"
            routerLink="/categories"
            routerLinkActive="active"
        >
            <span class="material-symbols-outlined">category</span>
            <p class="text-sm leading-normal font-medium">Categories</p>
        </a>
        <a
            class="flex items-center gap-3 rounded-lg px-3 py-2 text-gray-700 hover:bg-gray-200"
            href="#"
        >
            <span class="material-symbols-outlined">settings</span>
            <p class="text-sm leading-normal font-medium">Settings</p>
        </a>
    </div>

    <!-- Sidebar Footer -->
    <div class="border-border mt-auto border-t py-3">
        <button
            class="bg-primary flex h-10 w-full max-w-[480px] min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg px-4 text-sm leading-normal font-bold tracking-wide text-white"
        >
            <span class="truncate">Upgrade Plan</span>
        </button>
    </div>
</div>
