<header class="border-border flex items-center border-b px-4 py-3">
    <div class="flex items-center justify-self-start">
        <!-- Logo -->
        <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-circuit-board-icon lucide-circuit-board mr-4"
        >
            <rect width="18" height="18" x="3" y="3" rx="2" />
            <path d="M11 9h4a2 2 0 0 0 2-2V3" />
            <circle cx="9" cy="9" r="2" />
            <path d="M7 21v-4a2 2 0 0 1 2-2h4" />
            <circle cx="15" cy="15" r="2" />
        </svg>
        <h3 class="{{ hlmH3 }}">
            {{ appName }}
        </h3>
    </div>
    <div class="flex-1"></div>
    <div class="flex justify-end">
        <div hlmButtonGroup>
            <button hlmBtn variant="ghost">Profile</button>
            <button hlmBtn variant="ghost" size="icon" [brnMenuTriggerFor]="menu">
                <ng-icon hlm name="lucideChevronDown" size="sm" />
            </button>
        </div>
        <ng-template #menu>
            <hlm-menu class="w-45 [--radius:1rem]">
                <hlm-menu-group>
                    <button hlmMenuItem>
                        <ng-icon hlm name="lucideShare" size="sm" />
                        <span>Share</span>
                    </button>
                    <button hlmMenuItem>
                        <ng-icon hlm name="lucideCopy" size="sm" />
                        <span>Settings</span>
                    </button>
                </hlm-menu-group>
                <hlm-menu-separator />
                <hlm-menu-group>
                    <button
                        hlmMenuItem
                        variant="destructive"
                        class="hover:bg-destructive/10 dark:hover:bg-destructive/40"
                    >
                        <ng-icon hlm name="lucideUserRoundX" size="sm" class="!text-destructive" />
                        <span>Logout</span>
                    </button>
                </hlm-menu-group>
            </hlm-menu>
        </ng-template>
    </div>
</header>
