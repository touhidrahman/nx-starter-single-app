<div class="mb-2">
    <p>
        Are you sure you want to active new
        <strong>
            {{ config.data.planName ?? '' }} ({{ config.data.subscriptionType ?? '' }})
        </strong>
        package for <strong>{{ config.data.groupName ?? '' }}</strong
        >?
    </p>
</div>
<app-math-verification (verified)="onVerified($event)" />

<div class="mt-4 flex justify-end gap-3">
    <p-button label="Cancel" size="small" severity="secondary" (click)="onCloseModal()" />

    <p-button
        [disabled]="!isMathVerified()"
        [loading]="isLoading()"
        label="Yes"
        size="small"
        severity="danger"
        (click)="onApproveSubscriptionRequest()" />
</div>
