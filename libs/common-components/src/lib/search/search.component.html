<div class="flex items-center justify-center gap-2">
    <div class="relative w-full">
        <input
            class="placeholder:text-md h-[38px] w-full rounded-md border p-4 pr-10"
            pInputText
            [ngModel]="searchText()"
            (ngModelChange)="searchText.set($event)"
            placeholder="Search here" />
        @if (searchText()) {
            <button
                class="absolute top-1/2 right-2 -translate-y-1/2 transform text-gray-500 hover:text-gray-700"
                (click)="clearSearch()">
                <i class="pi pi-times"></i>
            </button>
        }
    </div>

    <p-button
        variant="text"
        icon="pi pi-search mt-1 text-black !font-extrabold"
        type="button"
        (click)="onSearch()"
        class="rounded-md border bg-[#EAFFEA] px-2 text-xs !text-black" />
    <!-- <p-button
                icon="pi pi-info-circle"
                [rounded]="false"
                [text]="true"
                [fitContent]="true"
                tooltipStyleClass="text-xs text-center"
                pTooltip="Search on 'Customer Code' and 'Purchase order'"
                tooltipPosition="top" /> -->
    @if (isActiveFilter()) {
        <p-button
            label="Filter"
            icon="pi pi-filter"
            (onClick)="onToggleFilter()"
            class="rounded-md text-sm" />
    }
</div>
