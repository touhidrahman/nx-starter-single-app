<div class="flex flex-col gap-4 rounded-xl border border-gray-200 bg-white p-5">
    <div class="flex items-center gap-4">
        <div class="h-12 w-12 p-2 flex items-center justify-center rounded bg-sky-100">
            <ng-icon [name]="icon()"></ng-icon>
        </div>
        <div>
            <h3 class="font-bold text-gray-900">{{ account().type }}</h3>
            <p class="text-sm text-gray-500">{{ account().accountName }}</p>
        </div>
    </div>
    <div>
        <p class="text-xs tracking-wider text-gray-500 uppercase">Current Balance</p>
        <p class="text-2xl font-bold text-gray-900">{{ account().balance | currency }}</p>
    </div>
    <div>
        <p class="text-xs tracking-wider text-gray-500 uppercase">Next Payment Due</p>
        <p class="text-sm font-medium text-gray-700">{{ account().monthlyDueDate | date }}</p>
    </div>
    <a
        class="mt-2 w-full rounded-lg bg-gray-100 px-4 py-2 text-center text-sm font-bold text-gray-800 hover:bg-gray-200"
        href="#"
        >View Details</a
    >
</div>
