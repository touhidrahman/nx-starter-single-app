<div class="flex h-full flex-col">
    <div class="flex-grow overflow-y-auto p-4">
        <div class="grid grid-cols-1 gap-4 md:grid-cols-3 lg:grid-cols-4">
            @for (file of documentFiles; track file) {
                <div
                    class="rounded-md border border-transparent bg-white p-3 text-center shadow-sm hover:border-gray-200 hover:shadow-md">
                    <div
                        class="mb-3 flex h-40 cursor-pointer items-center justify-center overflow-hidden"
                        (click)="openInNewTab(file)">
                        @if (file | isImage) {
                            <img
                                [src]="file"
                                alt="Image Document"
                                class="h-32 w-32 object-contain"
                                (error)="handleImageError($event)" />
                        } @else {
                            <img
                                [src]="getFileIcon(file)"
                                alt="File type icon"
                                class="h-32 w-32 object-contain" />
                        }
                    </div>
                    <div>
                        <a
                            class="line-clamp-1 cursor-pointer hover:text-emerald-500"
                            (click)="openInNewTab(file)">
                            {{ file.split('/').pop() }}
                        </a>
                    </div>
                </div>
            }
        </div>
    </div>

    <div class="flex-shrink-0 p-4">
        <div class="flex justify-end gap-2">
            <p-button
                label="Close"
                severity="secondary"
                (click)="close()"></p-button>
        </div>
    </div>
</div>
