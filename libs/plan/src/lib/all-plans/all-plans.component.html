<section
    class="relative mx-auto flex h-full flex-col items-center justify-center overflow-hidden rounded-xl">
    <!-- <img class="absolute h-full w-full object-cover" alt="Background pattern" /> -->
    <div class="relative">
        @let allPlans = planStateService.select('plans') | async;
        <div class="mb-4 flex items-center justify-between">
            <h3 class="primary-text pb-2 text-2xl font-bold text-gray-800">
                All Plans
            </h3>
            <div class="flex justify-center">
                <p-selectbutton
                    [options]="stateOptions"
                    [ngModel]="isYearly() === 'yearly' ? 'yearly' : 'monthly'"
                    (ngModelChange)="onYearlyChange($event)"
                    optionLabel="label"
                    optionValue="value"
                    aria-labelledby="basic" />
            </div>
        </div>

        <app-plan-card
            class="my-8"
            [allPlans]="allPlans ?? []"
            [isYearly]="isYearly()"
            [currentPlanId]="currentPlanId()" />
    </div>
</section>
