<div class="flex items-center justify-between gap-4 border-b border-gray-300 pb-2">
    <div class="flex flex-wrap items-center gap-x-4 gap-y-1">
        <h2 class="card-header-text m-0 max-w-64 text-xl font-semibold break-words sm:text-[24px]">
            {{ invitation().email }}
        </h2>
    </div>
    <i class="pi pi-trash mx-1 cursor-pointer text-red-400" (click)="onDelete($event)"> </i>
</div>

<div class="mt-3 flex items-center justify-between">
    <div class="ml-">
        <div class="flex items-start gap-3">
            <i class="pi pi-check-square mt-[3px] text-[13px] text-gray-500"></i>
            <div>
                <p class="text-xs font-medium text-gray-500">Status</p>
                <p
                    class="mt-1 rounded-[5px] px-2 pb-0.5 text-sm"
                    [ngClass]="{
                        'bg-green-100 text-green-800': invitation().status === 'accepted',
                        'bg-[#FFDBAF] text-[#842300]': invitation().status === 'pending',
                        'bg-red-100 text-red-800': invitation().status === 'rejected',
                    }">
                    {{ invitation().status }}
                </p>
            </div>
        </div>

        <div class="mt-5 flex items-start gap-3">
            <i class="pi pi-calendar mt-[3px] text-base text-gray-500"></i>
            <div>
                <p class="text-xs font-medium text-gray-500">Invited On</p>
                <p class="text-sm font-medium text-gray-800">
                    {{ invitation().invitedOn | date: 'dd/MM/yyyy' }}
                </p>
            </div>
        </div>
    </div>

    <div class="mr-14">
        <div class="mt-0 flex items-start gap-3">
            <i class="pi pi-user mt-[3px] text-sm text-gray-500"></i>
            <div>
                <p class="text-xs font-medium text-gray-500">Role</p>
                <p class="text-sm font-medium text-gray-800">
                    {{ invitation().roleName }}
                </p>
            </div>
        </div>

        <div class="mt-6 flex items-start gap-3">
            <i class="pi pi-calendar mt-[2px] text-base text-gray-500"></i>
            <div>
                <p class="text-xs font-medium text-gray-500">Accepted On</p>
                <p class="text-sm font-medium text-gray-800">
                    {{
                        invitation().acceptedOn
                            ? (invitation().acceptedOn | date: 'dd/MM/yyyy')
                            : 'Not accepted yet'
                    }}
                </p>
            </div>
        </div>
    </div>
</div>
