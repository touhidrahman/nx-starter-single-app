<div class="grid">
    <label for="role" class="w-24 pb-2 pl-[2px] font-semibold">
        Select Role
    </label>

    <p-select
        class="mt-2 w-full"
        id="role"
        [(ngModel)]="selectedRole"
        [options]="(roles$ | async) || []"
        placeholder="Select a role"
        optionLabel="label"
        optionValue="value"
        appendTo="body"
        [filter]="true"
        filterBy="label"
        filterPlaceholder="Search role...">
        <ng-template let-option pTemplate="item">
            <div class="flex items-center gap-2">
                <div class="min-w-0 flex-1">
                    <span class="block truncate whitespace-normal">
                        {{ option.label }}
                        @if (option.isDefaultRole) {
                            <i
                                class="pi pi-star-fill text-xs text-[#f97316]"></i>
                        }
                    </span>
                    @if (option.isDefaultRole) {
                        <span
                            class="block truncate text-xs whitespace-normal text-gray-500">
                            Default role, cannot be modified
                        </span>
                    }
                </div>
            </div>
        </ng-template>

        <ng-template let-option pTemplate="selectedItem">
            <div class="flex items-center gap-2">
                <span>{{ option.label }}</span>
                @if (option.isDefaultRole) {
                    <i class="pi pi-star-fill text-xs text-[#f97316]"></i>
                }
            </div>
        </ng-template>
    </p-select>
</div>

<div class="mt-4 flex justify-end gap-2">
    <p-button (click)="closeDialog()" label="Cancel" severity="secondary">
    </p-button>
    <p-button
        (click)="saveRole()"
        styleClass="bg-green3"
        [disabled]="!selectedRole"
        label="Save"
        severity="success">
    </p-button>
</div>
