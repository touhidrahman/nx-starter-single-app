<h1 class="mb-5 text-2xl font-bold">Invite Member</h1>
<form [formGroup]="formGroup" class="">
    <div>
        <label for="email" class="w-24 font-semibold">Email</label>
        <input
            class="placeholder:text-md mt-1 h-[38px] w-full rounded-md border-[1.5px] p-4"
            id="email"
            formControlName="email"
            pInputText
            placeholder="Email" />
    </div>

    <div class="my-4">
        <label for="description" class="w-24 font-semibold">Description</label>
        <input
            class="placeholder:text-md mt-1 h-[38px] w-full rounded-md border-[1.5px] p-4"
            id="description"
            formControlName="description"
            pInputText
            placeholder="Description" />
    </div>

    <div class="my-3 flex justify-end gap-2">
        <p-button label="Cancel" (onClick)="onCancel()"> </p-button>
        <p-button label="Submit" (onClick)="onSubmit()"> </p-button>
    </div>
</form>
