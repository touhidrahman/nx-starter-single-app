@if (group(); as group) {
    <div class="bg-white px-8 pt-2 pb-4">
        <div class="space-y-2 text-gray-700">
            @if (group.phone) {
                <p class="flex items-center">
                    <i class="pi pi-phone"></i>
                    <span class="ml-2"> {{ group.phone }}</span>
                </p>
            }
            @if (group.city || group.state || group.country) {
                <p class="flex items-center">
                    <i class="pi pi-map-marker"></i>
                    <span class="ml-2">
                        {{ group.city }},{{ group.state }},{{ group.country }}
                    </span>
                </p>
            }
        </div>
    </div>
}
