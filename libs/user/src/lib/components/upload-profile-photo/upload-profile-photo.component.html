<div class="flex flex-col gap-4 p-4 pb-4">
    @if (previewUrl) {
        <div class="flex flex-col items-center gap-4">
            <p-avatar
                [image]="previewUrl"
                size="xlarge"
                shape="circle"
                styleClass="h-48 w-48 border-2 border-primary" />

            <p-button
                label="Set as Profile Picture"
                icon="pi pi-user-edit"
                [loading]="isLoading"
                (onClick)="uploadAndSetProfilePicture()" />

            <div class="card flex justify-center">
                <p-toast />
                <div class="small-upload">
                    <p-fileupload
                        mode="basic"
                        chooseIcon="pi pi-upload"
                        accept="image/*"
                        (onSelect)="onFileSelect($event)"
                        [auto]="true"
                        chooseLabel="Select Another Picture" />
                </div>
            </div>
        </div>
    } @else {
        <div
            class="border-round surface-border border-gray border-1 p-4 text-center">
            <i class="pi pi-image secondary-text mb-2 text-2xl"></i>
            <p class="secondary-text m-0">No image selected</p>
        </div>
    }

    @if (!previewUrl) {
        <p-fileUpload
            accept="image/*"
            chooseIcon="pi pi-upload"
            chooseLabel="Upload a Picture"
            mode="basic"
            (onSelect)="onFileSelect($event)"
            [showUploadButton]="false"
            [showCancelButton]="false" />
    }
</div>
