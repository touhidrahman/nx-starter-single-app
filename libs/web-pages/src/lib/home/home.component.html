<div class="mb-8 flex flex-wrap items-center justify-between gap-4">
    <div class="flex flex-col gap-1">
        <h1 hlmH1 class="text-3xl leading-tight font-black tracking-tight text-gray-900">
            Welcome, Alex!
        </h1>
        <p class="text-base leading-normal font-normal text-gray-500">
            Here's a summary of your financial health.
        </p>
    </div>
    <button
        class="bg-primary flex h-10 min-w-[84px] cursor-pointer items-center justify-center gap-2 overflow-hidden rounded-lg px-4 text-sm leading-normal font-bold tracking-wide text-white"
    >
        <span class="material-symbols-outlined text-base">add</span>
        <span class="truncate">Add Account</span>
    </button>
</div>
<div class="mb-10 grid grid-cols-1 gap-6 md:grid-cols-3">
    <app-dashboard-account-widget
        [title]="'Total Net Worth'"
        [amount]="'50,234.00'"
        [subtitle]="'-1.2%'"
    ></app-dashboard-account-widget>
    <app-dashboard-account-widget
        [title]="'Total Debt'"
        [amount]="'50,234.00'"
        [subtitle]="'-1.2%'"
    ></app-dashboard-account-widget>
    <app-dashboard-account-widget
        [title]="'Recent Spending'"
        [amount]="'50,234.00'"
        [subtitle]="'-1.2%'"
    ></app-dashboard-account-widget>
</div>
<div class="flex flex-col gap-10"></div>
