<div class="container mx-auto p-6">
    <h1 class="mb-6 text-2xl font-bold">
        {{ isEditMode ? 'Edit Category' : 'Add Category' }}
    </h1>

    <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()" class="max-w-2xl space-y-4">
        <div>
            <label hlmLabel for="name">Name *</label>
            <input
                hlmInput
                id="name"
                type="text"
                formControlName="name"
                placeholder="Enter category name"
            />
            @if (categoryForm.get('name')?.invalid && categoryForm.get('name')?.touched) {
                <p hlmError>Name is required (minimum 3 characters)</p>
            }
        </div>

        <div>
            <label hlmLabel for="description">Description</label>
            <textarea
                hlmInput
                id="description"
                formControlName="description"
                placeholder="Enter category description"
                rows="4"
            ></textarea>
        </div>

        <div class="flex items-center space-x-2">
            <input type="checkbox" id="isActive" formControlName="isActive" hlmCheckbox />
            <label hlmLabel for="isActive">Active</label>
        </div>

        <div class="flex gap-4 pt-4">
            <button hlmBtn type="submit" [disabled]="categoryForm.invalid">
                {{ isEditMode ? 'Update' : 'Create' }}
            </button>
            <button hlmBtn variant="outline" type="button" (click)="onCancel()">Cancel</button>
        </div>
    </form>
</div>
