<div class="relative flex w-full flex-col items-center justify-center p-4 sm:p-6 lg:p-8">
    <main class="w-full max-w-2xl">
        <div [formGroup]="loanForm" class="flex flex-col gap-8">
            <!-- Page Heading -->
            <div class="text-center">
                <h1 hlmH3 class="">Edit Loan Account</h1>
                <p class="mt-2 text-base text-zinc-500 dark:text-zinc-400">
                    Update your loan account details below.
                </p>
            </div>
            <!-- Form Container -->
            <div class="w-full space-y-6">
                <!-- Nickname -->
                <div class="flex flex-col">
                    <label class="mb-2" hlmLabel
                        >Nickname <span class="text-destructive">*</span></label
                    >
                    <hlm-form-field>
                        <input
                            class="w-full"
                            hlmInput
                            type="text"
                            placeholder="e.g., My Car Loan"
                            formControlName="name"
                        />
                        <hlm-hint>A friendly name for this account.</hlm-hint>
                        <hlm-error>The field is required.</hlm-error>
                    </hlm-form-field>
                </div>

                <!-- Bank Name -->
                <div class="flex flex-col">
                    <label class="mb-2" hlmLabel>Financial Institution or Party</label>
                    <hlm-form-field>
                        <input
                            formControlName="bankName"
                            class="w-full"
                            hlmInput
                            type="text"
                            placeholder="e.g., Ally Bank"
                        />
                    </hlm-form-field>
                </div>

                <!-- Loan Subject -->
                <div class="flex flex-col">
                    <label class="mb-2" hlmLabel>Loan Type</label>
                    <hlm-form-field>
                        <brn-select
                            formControlName="loan_subject"
                            class="inline-block w-64"
                            placeholder="Select an option"
                        >
                            <hlm-select-trigger class="w-full">
                                <hlm-select-value />
                            </hlm-select-trigger>
                            <hlm-select-content>
                                <hlm-option value="car">Car</hlm-option>
                                <hlm-option value="home_mortgage">Home Mortgage</hlm-option>
                                <hlm-option value="student_loan">Student Loan</hlm-option>
                                <hlm-option value="personal_loan">Personal Loan</hlm-option>
                                <hlm-option value="other">Other</hlm-option>
                            </hlm-select-content>
                        </brn-select>
                    </hlm-form-field>
                </div>

                <!-- Account Name -->
                <div class="flex flex-col">
                    <label class="mb-2" hlmLabel>Account Name</label>
                    <hlm-form-field>
                        <input
                            formControlName="accountName"
                            class="w-full"
                            hlmInput
                            type="text"
                            placeholder="e.g., John Doe"
                        />
                    </hlm-form-field>
                </div>

                <!-- Account Number -->
                <div class="flex flex-col">
                    <label class="mb-2" hlmLabel>Account Number</label>
                    <hlm-form-field>
                        <input
                            formControlName="accountNumber"
                            class="w-full"
                            hlmInput
                            type="text"
                            placeholder="e.g., 123456789"
                        />
                    </hlm-form-field>
                </div>

                <!-- Balance -->
                <div class="flex flex-col">
                    <label class="mb-2" hlmLabel>Balance</label>
                    <hlm-form-field>
                        <input
                            formControlName="balance"
                            class="w-full"
                            hlmInput
                            type="number"
                            placeholder="e.g., -15000"
                        />
                    </hlm-form-field>
                </div>

                <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                    <!-- Loan Start Date -->
                    <div class="flex flex-col">
                        <label class="mb-2" hlmLabel>Loan Start Date</label>
                        <hlm-form-field>
                            <input
                                formControlName="loan_startDate"
                                class="w-full"
                                hlmInput
                                type="date"
                            />
                        </hlm-form-field>
                    </div>

                    <!-- Loan End Date -->
                    <div class="flex flex-col">
                        <label class="mb-2" hlmLabel>Loan End Date</label>
                        <hlm-form-field>
                            <input
                                formControlName="loan_endDate"
                                class="w-full"
                                hlmInput
                                type="date"
                            />
                        </hlm-form-field>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                    <div class="flex flex-col">
                        <label class="mb-2" hlmLabel>Loan Interest Rate</label>
                        <hlm-form-field>
                            <input
                                formControlName="loan_interestRate"
                                class="w-full"
                                hlmInput
                                type="number"
                                placeholder="e.g., 5.5"
                            />
                        </hlm-form-field>
                    </div>

                    <div class="flex flex-col">
                        <label class="mb-2" hlmLabel>Monthly Due Date</label>

                        <hlm-form-field>
                            <input
                                formControlName="monthlyDueDate"
                                class="w-full"
                                hlmInput
                                type="number"
                                placeholder="e.g., 15"
                            />
                        </hlm-form-field>
                    </div>
                </div>

                <!-- Use for Net Worth -->
                <div class="flex items-center space-x-2">
                    <input
                        type="checkbox"
                        hlmCheckbox
                        formControlName="useForNetWorth"
                        id="useForNetWorth"
                    />
                    <label
                        hlmLabel
                        for="useForNetWorth"
                        class="text-sm leading-none font-medium peer-disabled:cursor-not-allowed peer-disabled:opacity-70"
                    >
                        Use for Net Worth
                    </label>
                </div>
            </div>
            <!-- Action Buttons -->
            <div class="flex flex-col gap-4 pt-2">
                <button
                    hlmBtn
                    (click)="saveAccount()"
                    class="flex h-12 w-full items-center justify-center rounded-lg px-6 text-base font-semibold"
                >
                    Save Account
                </button>
                <button
                    hlmBtn
                    variant="ghost"
                    class="flex w-full items-center justify-center rounded-lg px-6 text-base font-semibold"
                >
                    Cancel
                </button>
            </div>
        </div>
    </main>
</div>
