<div class="relative flex w-full flex-col items-center justify-center p-4 sm:p-6 lg:p-8">
    <main class="w-full max-w-2xl">
        <div [formGroup]="bankForm" class="flex flex-col gap-8">
            <!-- Page Heading -->
            <div class="text-center">
                <h1 hlmH3 class="">Edit Bank Account</h1>
                <p class="mt-2 text-base text-zinc-500 dark:text-zinc-400">
                    Update your bank account details below.
                </p>
            </div>
            <!-- Form Container -->
            <div class="w-full space-y-6">
                <!-- Nickname -->
                <div class="flex flex-col">
                    <label class="mb-2" hlmLabel>
                        Nickname <span class="text-destructive">*</span></label
                    >
                    <hlm-form-field>
                        <input
                            class="w-full"
                            hlmInput
                            type="text"
                            placeholder="e.g., My Checking"
                            formControlName="name"
                        />
                        <hlm-hint>A friendly name for this account.</hlm-hint>
                        <hlm-error>The field is required.</hlm-error>
                    </hlm-form-field>
                </div>

                <!-- Bank Type -->
                <div class="flex flex-col">
                    <label class="mb-2" hlmLabel>Account Type</label>
                    <hlm-form-field>
                        <brn-select
                            formControlName="type"
                            class="inline-block w-64"
                            placeholder="Select an option"
                        >
                            <hlm-select-trigger class="w-full">
                                <hlm-select-value />
                            </hlm-select-trigger>
                            <hlm-select-content>
                                <hlm-option value="Checking">Checking</hlm-option>
                                <hlm-option value="Savings">Savings</hlm-option>
                            </hlm-select-content>
                        </brn-select>
                    </hlm-form-field>
                </div>

                <!-- Account Name -->
                <div class="flex flex-col">
                    <label class="mb-2" hlmLabel>Account Name</label>
                    <hlm-form-field>
                        <input
                            formControlName="accountName"
                            class="w-full"
                            hlmInput
                            type="text"
                            placeholder="e.g., John Doe"
                        />
                    </hlm-form-field>
                </div>

                <!-- Bank Name -->
                <div class="flex flex-col">
                    <label class="mb-2" hlmLabel>Bank Name</label>
                    <hlm-form-field>
                        <input
                            formControlName="bankName"
                            class="w-full"
                            hlmInput
                            type="text"
                            placeholder="e.g., Bank of America"
                        />
                    </hlm-form-field>
                </div>

                <!-- Account Number -->
                <div class="flex flex-col">
                    <label class="mb-2" hlmLabel>Account Number (or IBAN Number)</label>
                    <hlm-form-field>
                        <input
                            formControlName="accountNumber"
                            class="w-full"
                            hlmInput
                            type="text"
                            placeholder="e.g., 123456789"
                        />
                    </hlm-form-field>
                </div>

                <!-- Routing Number -->
                <div class="flex flex-col">
                    <label class="mb-2" hlmLabel>Routing Number</label>
                    <hlm-form-field>
                        <input
                            formControlName="bank_routing"
                            class="w-full"
                            hlmInput
                            type="text"
                            placeholder="e.g., 987654321"
                        />
                    </hlm-form-field>
                </div>

                <div class="flex flex-col">
                    <label class="mb-2" hlmLabel>Current Balance</label>
                    <hlm-form-field>
                        <input
                            formControlName="balance"
                            class="w-full"
                            hlmInput
                            type="number"
                            placeholder="0.00"
                        />
                    </hlm-form-field>
                </div>

                <!-- Use for Net Worth -->
                <div class="flex items-center space-x-2">
                    <input
                        type="checkbox"
                        hlmCheckbox
                        formControlName="useForNetWorth"
                        id="useForNetWorth"
                    />
                    <label
                        hlmLabel
                        for="useForNetWorth"
                        class="text-sm leading-none font-medium peer-disabled:cursor-not-allowed peer-disabled:opacity-70"
                    >
                        Use for Net Worth
                    </label>
                </div>
            </div>
            <!-- Action Buttons -->
            <div class="flex flex-col gap-4 pt-2">
                <button
                    hlmBtn
                    (click)="saveAccount()"
                    class="flex h-12 w-full items-center justify-center rounded-lg px-6 text-base font-semibold"
                >
                    Save Account
                </button>
                <button
                    hlmBtn
                    variant="ghost"
                    class="flex w-full items-center justify-center rounded-lg px-6 text-base font-semibold"
                >
                    Cancel
                </button>
            </div>
        </div>
    </main>
</div>
